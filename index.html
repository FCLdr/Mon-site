<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Engilearn</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #121621 0%, #0b0d11 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            cursor: pointer;
        }

        .tab {
            padding: 10px 20px;
            font-weight: 600;
            color: #666;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .tab.active {
            color: #28a745;
            border-bottom: 3px solid #28a745;
        }

        .form-content { display: none; }
        .form-content.active { display: block; }

        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #aaa; }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            box-sizing: border-box;
            background: rgba(0,0,0,0.2);
            color: white;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            background-color: #28a745;
        }

        .btn:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">Se connecter</div>
        <div class="tab" onclick="switchTab('signup')">S'inscrire</div>
    </div>

    <div id="login-form" class="form-content active">
        <form id="formConnexion">
            <div class="form-group">
                <label>Pseudo</label>
                <input type="text" id="userLogin" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="passLogin" required>
            </div>
            <button type="submit" class="btn">Connexion</button>
        </form>
    </div>

    <div id="signup-form" class="form-content">
        <form id="formInscription">
            <div class="form-group">
                <label>Choisir un pseudo</label>
                <input type="text" id="userSign" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="passSign" required>
            </div>
            <button type="submit" class="btn">Créer le compte</button>
        </form>
    </div>
</div>

<script>
    function switchTab(type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-content').forEach(f => f.classList.remove('active'));
        if(type === 'login') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('login-form').classList.add('active');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('signup-form').classList.add('active');
        }
    }

    // --- INSCRIPTION ---
    document.getElementById('formInscription').addEventListener('submit', function(e) {
        e.preventDefault();
        const pseudo = document.getElementById('userSign').value.trim();
        const mdp = document.getElementById('passSign').value.trim();

        // Enregistrement
        localStorage.setItem('compte_pseudo', pseudo);
        localStorage.setItem('compte_mdp', mdp);

        // On bascule directement sur la connexion sans message
        switchTab('login');
    });

    // --- CONNEXION ---
    document.getElementById('formConnexion').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const saisiUser = document.getElementById('userLogin').value.trim();
        const saisiMdp = document.getElementById('passLogin').value.trim();

        const memoireUser = localStorage.getItem('compte_pseudo');
        const memoireMdp = localStorage.getItem('compte_mdp');

        // VERIFICATION
        if (!memoireUser) {
            alert("Erreur : Aucun compte n'existe. Inscris-toi d'abord !");
        } 
        else if (saisiUser === memoireUser && saisiMdp === memoireMdp) {
            // REDIRECTION DIRECTE SANS ALERTE
            window.location.href = "engilearnweb.html";
        } 
        else {
            alert("Identifiant ou mot de passe incorrect.");
        }
    });
</script>

</body>
</html>
